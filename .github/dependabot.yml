# Dependabot policy for this repo.
# Reference: https://docs.github.com/en/code-security/dependabot/working-with-dependabot/dependabot-options-reference
#
# Policy: turn off Dependabot's automatic update PRs, but keep its vulnerability
# notifications. A uniform 7-day quarantine applies to every dependency change
# (enforced by `minimumReleaseAge: 10080` in pnpm-workspace.yaml), and routine
# bumps are done by hand. Concretely:
#
#   * NO version-update PRs. `open-pull-requests-limit: 0` disables Dependabot
#     version updates for each ecosystem below.
#
#   * NO automatic security-fix PRs. Dependabot "security updates" are IMMEDIATE
#     by design (`cooldown` does not apply to them), so they would bypass the
#     7-day quarantine. Disable them at the repo level: Settings -> Code security
#     -> "Dependabot security updates" -> Disabled.
#
#   * Dependabot ALERTS stay ENABLED — these are the notifications, not PRs.
#     Keep Settings -> Code security -> "Dependabot alerts" -> Enabled. High and
#     critical CVEs are triaged from the alert list and patched by hand once the
#     fixed version clears the 7-day quarantine.
#
# The blocks below exist only to disable version-update PRs. `schedule` is
# required syntax but inert while updates are off; `cooldown` documents the
# 7-day intent should version updates ever be re-enabled.
version: 2
updates:
  # npm ecosystem covers pnpm-lock.yaml.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    cooldown:
      default-days: 7

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    cooldown:
      default-days: 7

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    cooldown:
      default-days: 7
